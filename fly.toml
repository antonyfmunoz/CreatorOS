app = "creatoros-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    VITE_CLERK_PUBLISHABLE_KEY = "pk_test_dG9sZXJhbnQtcGFycm90LTk3LmNsZXJrLmFjY291bnRzLmRldiQ"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
